<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho - Laços Encantus</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #fff, #ffe6f2);
  min-height: 100vh;
}

header {
  background: #fff;
  padding: 10px;
  text-align: center;
  border-bottom: 2px solid gold;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(212,175,55,0.12);
}

.logo { width: 80px; cursor: pointer; }
.logo-fallback {
  width: 80px; height: 80px;
  display: none; margin: 0 auto;
  background: gold; border-radius: 50%;
  align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px; color: #fff; cursor: pointer;
}

nav {
  background: #ff4da6;
  padding: 10px;
  display: flex;
  justify-content: space-around;
}
nav a { color: white; text-decoration: none; font-weight: 500; font-size: 14px; }

/* PAGE TITLE */
.page-title {
  text-align: center;
  padding: 28px 20px 6px;
}
.page-title h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px;
  font-weight: 600;
  color: #d4af37;
  margin: 0 0 4px;
}
.page-title p { font-size: 13px; color: #bbb; margin: 0; }

.container {
  padding: 16px 20px 40px;
  max-width: 600px;
  margin: auto;
}

/* CARD DE ITEM */
.item {
  background: white;
  border-radius: 18px;
  padding: 18px 18px 14px;
  margin: 14px 0;
  border: 1.5px solid #fde8f3;
  position: relative;
  box-shadow: 0 2px 12px rgba(255,77,166,0.06);
  transition: box-shadow 0.2s;
}
.item:hover { box-shadow: 0 4px 20px rgba(255,77,166,0.12); }

.item-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding-right: 36px;
}

.item-badge {
  background: linear-gradient(135deg, #ff4da6, #ff80c4);
  color: white;
  border-radius: 8px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

.item-badge.produto {
  background: linear-gradient(135deg, #d4af37, #f0d060);
  color: #1a1a1a;
}

.item-nome {
  font-weight: 600;
  font-size: 14px;
  color: #222;
  flex: 1;
  line-height: 1.3;
}

/* GRID DE DETALHES */
.item-detalhes {
  margin-top: 12px;
  font-size: 12px;
  color: #888;
  line-height: 2;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 10px;
  background: #fdf8fb;
  border-radius: 10px;
  padding: 8px 12px;
}
.item-detalhe {
  display: flex;
  gap: 4px;
  align-items: baseline;
}
.item-detalhe strong { color: #666; font-weight: 500; }

/* TAG DE PERSONALIZAÇÃO */
.pers-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #fff0f8;
  border: 1px dashed #ffb3d9;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px;
  color: #ff4da6;
  margin-top: 8px;
  font-style: italic;
  word-break: break-word;
}

.item-preco-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}

.item-preco {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  color: #ff4da6;
}

.remove {
  position: absolute;
  right: 14px;
  top: 14px;
  background: #fff0f0;
  color: #e63946;
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}
.remove:hover { background: #ffe0e0; }

/* Personalização inline noiva */
.personalizacao-box {
  margin-top: 10px;
  background: #fff8fc;
  border: 1.5px dashed #ffb3d9;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 13px;
}
.personalizacao-box label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #ff4da6;
  letter-spacing: 0.3px;
  margin-bottom: 5px;
}
.personalizacao-box input {
  width: 100%;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1.5px solid #ffd6e7;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  outline: none;
  transition: 0.2s;
  margin: 0;
  background: #fff;
}
.personalizacao-box input:focus { border-color: #ff4da6; }

/* FORMULÁRIO DE ENTREGA */
.form-entrega {
  background: white;
  padding: 20px;
  border-radius: 18px;
  margin-top: 20px;
  border: 1.5px solid #fde8f3;
  box-shadow: 0 2px 12px rgba(255,77,166,0.06);
}

.form-entrega .form-title {
  font-size: 14px;
  font-weight: 600;
  color: #333;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.campo-grupo {
  margin-top: 10px;
}
.campo-grupo label {
  font-size: 11px;
  font-weight: 500;
  color: #aaa;
  display: block;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}

input, select {
  width: 100%;
  padding: 11px 14px;
  border-radius: 10px;
  border: 1.5px solid #eee;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  outline: none;
  transition: 0.2s;
  background: #fafafa;
  color: #333;
}
input:focus, select:focus { border-color: #ff4da6; background: #fff; }
input.erro { border: 2px solid #ff4d4d !important; background: #fff5f5; }

/* TOTAL */
.total-box {
  background: white;
  border-radius: 16px;
  border: 1.5px solid #fde8f3;
  padding: 18px 20px;
  margin-top: 18px;
  box-shadow: 0 2px 12px rgba(255,77,166,0.06);
}
.total-linha {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  font-size: 13px;
  color: #888;
}
.total-linha strong { color: #555; font-weight: 500; }
.total-linha.destaque {
  font-size: 18px;
  font-weight: 700;
  color: #d4af37;
  border-top: 1px solid #f5e8f0;
  margin-top: 10px;
  padding-top: 12px;
}
.total-linha.destaque span:last-child {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
}

/* BOTÕES */
button {
  border: none;
  padding: 14px;
  width: 100%;
  margin-top: 12px;
  font-weight: 600;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  transition: 0.2s;
}

.btn-wpp {
  background: linear-gradient(135deg, #25D366, #1eba57);
  color: white;
  box-shadow: 0 4px 14px rgba(37,211,102,0.3);
  font-size: 15px;
}
.btn-wpp:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(37,211,102,0.4);
}

.btn-limpar {
  background: #f8f8f8;
  color: #bbb;
  font-size: 13px;
  padding: 11px;
  border: 1.5px solid #eee;
}
.btn-limpar:hover { background: #f0f0f0; color: #999; }

/* EMPTY STATE */
.empty {
  text-align: center;
  margin-top: 60px;
  color: #bbb;
  font-size: 15px;
}
.empty .big { font-size: 64px; margin-bottom: 14px; line-height: 1; }
.empty h3 { color: #ccc; font-size: 18px; margin: 0 0 8px; }
.empty p { font-size: 13px; margin: 0 0 20px; }
.empty a {
  display: inline-block;
  background: linear-gradient(135deg, #ff4da6, #ff80c4);
  color: white;
  padding: 12px 28px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  box-shadow: 0 4px 14px rgba(255,77,166,0.3);
}

/* PRAZO INFO */
.prazo-info {
  background: #fffbf0;
  border: 1px solid #ffe8a0;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  color: #a08020;
  text-align: center;
  margin-top: 12px;
  line-height: 1.5;
}

/* POPUP ERRO */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.popup.ativo { display: flex; }

.popup-content {
  background: white;
  padding: 28px 24px;
  border-radius: 20px;
  text-align: center;
  max-width: 300px;
  width: 90%;
  box-shadow: 0 12px 50px rgba(0,0,0,0.18);
  animation: popIn 0.2s ease;
}
@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
.popup-icone { font-size: 44px; margin-bottom: 10px; }
.popup-content h3 { color: #e63946; margin-bottom: 8px; font-size: 16px; }
.popup-content p  { color: #888; font-size: 13px; margin-bottom: 18px; line-height: 1.5; }
.popup-content button {
  background: #f5f5f5;
  color: #666;
  border: 1.5px solid #eee;
  width: auto;
  padding: 9px 24px;
  font-size: 13px;
  border-radius: 10px;
}
.popup-content button:hover { background: #eeeeee; }
</style>
</head>

<body>

<header>
  <img
    src="logo.png" class="logo" alt="Logo"
    onclick="window.location.href='index.html'"
    onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex';"
  >
  <div class="logo-fallback" onclick="window.location.href='index.html'">Terço</div>
</header>

<nav>
  <a href="index.html">Início</a>
  <a href="terco.html">Montar</a>
  <a href="produtos.html">Produtos</a>
  <a href="carrinho.html">🛒 Carrinho</a>
</nav>

<div class="page-title">
  <h2>Seu Carrinho 🛒</h2>
  <p id="page-subtitle">Revise seus itens antes de finalizar</p>
</div>

<div class="container">

  <div id="lista"></div>

  <div id="secao-entrega" style="display:none;">

    <div class="form-entrega">
      <div class="form-title">📍 Dados de entrega</div>
      <div class="campo-grupo">
        <label>NOME COMPLETO</label>
        <input id="nomeCliente" placeholder="Seu nome completo">
      </div>
      <div class="campo-grupo">
        <label>ENDEREÇO</label>
        <input id="endereco" placeholder="Rua, número, complemento">
      </div>
      <div class="campo-grupo">
        <label>BAIRRO</label>
        <input id="bairro" placeholder="Seu bairro">
      </div>
      <div class="campo-grupo">
        <label>FRETE</label>
        <select id="frete" onchange="render()">
          <option value="0">Centro (Grátis)</option>
          <option value="5">Outros bairros (+R$ 5,00)</option>
          <option value="15">Outras cidades (+R$ 15,00)</option>
        </select>
      </div>
    </div>

    <div class="total-box" id="total-box"></div>

    <button class="btn-wpp" onclick="finalizarWhatsApp()">
      📲 Finalizar via WhatsApp
    </button>

    <div class="prazo-info">
      ⏳ Produtos personalizados: prazo médio de até <strong>15 dias úteis</strong> após confirmação do pagamento.
    </div>

    <button class="btn-limpar" onclick="limparCarrinho()">🗑 Esvaziar carrinho</button>
  </div>

</div>

<!-- POPUP ERRO -->
<div class="popup" id="popupErro">
  <div class="popup-content">
    <div class="popup-icone">⚠️</div>
    <h3>Atenção</h3>
    <p id="popupErroMsg">Preencha todos os dados de entrega.</p>
    <button onclick="fecharPopup()">Entendi</button>
  </div>
</div>

<script>

let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

/* =============================================
   MAPEAMENTO DE RÓTULOS
   ============================================= */
const tipoLabels = {
  pulso:       '📿 Pulso',
  tradicional: '🙏 Tradicional',
  chaveiro:    '🔑 Chaveiro',
  veiculo:     '🚗 Veículo',
  noiva:       '💍 Noiva',
  luxo:        '✨ Luxo',
  infantil:    '🧸 Infantil',
  embalagem:   '🎁 Embalagem',
  produto:     '🏪 Produto'
};

const nomeTipo = {
  pulso:       'Terço de Pulso',
  tradicional: 'Terço Tradicional',
  chaveiro:    'Chaveiro',
  veiculo:     'Terço de Veículo',
  noiva:       'Terço de Noiva',
  luxo:        'Terço Luxo',
  infantil:    'Terço Infantil',
  embalagem:   'Embalagem',
  produto:     'Produto'
};

const tiposComPersonalizacaoTexto = ['noiva'];
const tiposSemCorMisterio = ['embalagem', 'produto'];

/* =============================================
   RENDER
   ============================================= */
function render() {
  const lista = document.getElementById('lista');
  const secao = document.getElementById('secao-entrega');
  lista.innerHTML = '';

  if (carrinho.length === 0) {
    lista.innerHTML = `
      <div class="empty">
        <div class="big">🛒</div>
        <h3>Carrinho vazio</h3>
        <p>Adicione produtos para continuar.</p>
        <a href="terco.html">✨ Montar meu terço</a>
      </div>`;
    secao.style.display = 'none';
    document.getElementById('page-subtitle').textContent = 'Seu carrinho está vazio';
    return;
  }

  const qtd = carrinho.length;
  document.getElementById('page-subtitle').textContent =
    `${qtd} ${qtd === 1 ? 'item' : 'itens'} no carrinho`;
  secao.style.display = 'block';
  let subtotal = 0;

  carrinho.forEach((item, index) => {
    subtotal += Number(item.total) || 0;

    const tipo = item.tipo || 'produto';
    const isProduto = (item.origem === 'produto' || tipo === 'produto');
    const badge = tipoLabels[tipo] || tipo;
    const nome  = item.nome || nomeTipo[tipo] || 'Produto';
    const temPersonalizacaoTexto = tiposComPersonalizacaoTexto.includes(tipo);
    const temCorMisterio = !tiposSemCorMisterio.includes(tipo);

    // Detalhes do item
    let detalhes = '';
    if (item.categoria) {
      detalhes += `<div class="item-detalhe"><strong>Categoria:</strong> ${item.categoria}</div>`;
    }
    if (item.modelo && item.modelo !== item.nome) {
      detalhes += `<div class="item-detalhe"><strong>Modelo:</strong> ${item.modelo}</div>`;
    }
    if (temCorMisterio && item.cor) {
      detalhes += `<div class="item-detalhe"><strong>Cor:</strong> ${item.cor}</div>`;
    }
    if (temCorMisterio && item.misterio) {
      detalhes += `<div class="item-detalhe"><strong>Mistério:</strong> ${item.misterio}</div>`;
    }

    // Bloco de personalização da embalagem
    let blocoPersonalizacaoEmbalagem = '';
    if (tipo === 'embalagem' && item.personalizacao && typeof item.personalizacao === 'object') {
      const p = item.personalizacao;
      let tagsHtml = '';
      if (p.nome)    tagsHtml += `<div class="pers-tag">👤 ${p.nome}</div>`;
      if (p.cor)     tagsHtml += `<div class="pers-tag">🎨 ${p.cor}</div>`;
      if (p.frase)   tagsHtml += `<div class="pers-tag">✍️ ${p.frase}</div>`;
      if (p.formato) tagsHtml += `<div class="pers-tag">📋 ${p.formato}</div>`;
      if (p.temFoto) tagsHtml += `<div class="pers-tag">📷 Com foto</div>`;
      if (tagsHtml)  blocoPersonalizacaoEmbalagem = `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">${tagsHtml}</div>`;
    }

    // Campo de personalização texto (noiva)
    let blocoPersonalizacaoTexto = '';
    if (temPersonalizacaoTexto) {
      const valAtual = typeof item.personalizacao === 'object'
        ? (item.personalizacao.texto || '')
        : (item.personalizacao || '');
      blocoPersonalizacaoTexto = `
        <div class="personalizacao-box">
          <label>✍️ Nome dos noivos / mensagem</label>
          <input
            type="text"
            placeholder="Ex: Ana & João — 15/06/2025"
            value="${escapeAttr(valAtual)}"
            oninput="atualizarPersonalizacao(${index}, this.value)"
          >
        </div>
      `;
    }

    lista.innerHTML += `
      <div class="item">
        <button class="remove" onclick="remover(${index})" title="Remover">×</button>
        <div class="item-header">
          <span class="item-badge ${isProduto ? 'produto' : ''}">${badge}</span>
          <span class="item-nome">${nome}</span>
        </div>
        ${detalhes ? `<div class="item-detalhes">${detalhes}</div>` : ''}
        ${blocoPersonalizacaoEmbalagem}
        ${blocoPersonalizacaoTexto}
        <div class="item-preco-row">
          <span class="item-preco">R$ ${Number(item.total).toFixed(2).replace('.', ',')}</span>
        </div>
      </div>
    `;
  });

  const frete = Number(document.getElementById('frete').value) || 0;
  const total = subtotal + frete;

  document.getElementById('total-box').innerHTML = `
    <div class="total-linha">
      <span>Subtotal (${carrinho.length} ${carrinho.length === 1 ? 'item' : 'itens'})</span>
      <span>R$ ${subtotal.toFixed(2).replace('.', ',')}</span>
    </div>
    <div class="total-linha">
      <span>Frete</span>
      <span>${frete === 0 ? '🎉 Grátis' : 'R$ ' + frete.toFixed(2).replace('.', ',')}</span>
    </div>
    <div class="total-linha destaque">
      <span>Total</span>
      <span>R$ ${total.toFixed(2).replace('.', ',')}</span>
    </div>
  `;
}

function escapeAttr(str) {
  return (str || '').replace(/"/g, '&quot;');
}

/* =============================================
   AÇÕES
   ============================================= */
function remover(index) {
  carrinho.splice(index, 1);
  salvar();
  render();
}

function atualizarPersonalizacao(index, valor) {
  if (typeof carrinho[index].personalizacao === 'object') {
    carrinho[index].personalizacao.texto = valor;
  } else {
    carrinho[index].personalizacao = valor;
  }
  salvar();
}

function limparCarrinho() {
  if (!confirm('Deseja esvaziar o carrinho?')) return;
  carrinho = [];
  salvar();
  render();
}

function salvar() {
  localStorage.setItem('carrinho', JSON.stringify(carrinho));
}

/* =============================================
   POPUP
   ============================================= */
function mostrarErro(msg) {
  document.getElementById('popupErroMsg').textContent = msg || 'Preencha todos os dados de entrega.';
  document.getElementById('popupErro').classList.add('ativo');
}
function fecharPopup() {
  document.getElementById('popupErro').classList.remove('ativo');
}
document.getElementById('popupErro').addEventListener('click', function(e) {
  if (e.target === this) fecharPopup();
});

/* =============================================
   WHATSAPP
   ============================================= */
function gerarID() {
  return 'PED-' + Date.now().toString().slice(-8);
}

function textoPersonalizacao(item) {
  const p = item.personalizacao;
  if (!p) return null;
  if (typeof p === 'string') return p || null;
  if (typeof p === 'object') {
    const partes = [];
    if (p.texto)   partes.push(`Mensagem: "${p.texto}"`);
    if (p.nome)    partes.push(`Nome: ${p.nome}`);
    if (p.cor)     partes.push(`Cor: ${p.cor}`);
    if (p.frase)   partes.push(`Frase: "${p.frase}"`);
    if (p.formato) partes.push(`Formato: ${p.formato}`);
    if (p.temFoto) partes.push('Com foto personalizada');
    return partes.length ? partes.join(' | ') : null;
  }
  return null;
}

function finalizarWhatsApp() {
  if (carrinho.length === 0) return;

  const nomeInput     = document.getElementById('nomeCliente');
  const enderecoInput = document.getElementById('endereco');
  const bairroInput   = document.getElementById('bairro');

  const nome     = nomeInput.value.trim();
  const endereco = enderecoInput.value.trim();
  const bairro   = bairroInput.value.trim();

  [nomeInput, enderecoInput, bairroInput].forEach(i => i.classList.remove('erro'));

  if (!nome || !endereco || !bairro) {
    if (!nome)     nomeInput.classList.add('erro');
    if (!endereco) enderecoInput.classList.add('erro');
    if (!bairro)   bairroInput.classList.add('erro');
    mostrarErro('Por favor, preencha todos os dados de entrega antes de finalizar.');
    return;
  }

  const id    = gerarID();
  const frete = Number(document.getElementById('frete').value) || 0;
  let subtotal = 0;

  let msg = '🛍️ *LAÇOS ENCANTUS — NOVO PEDIDO*\n';
  msg += '━━━━━━━━━━━━━━━━━━━━━\n';
  msg += `🆔 *Pedido:* ${id}\n`;
  msg += `📅 *Data:* ${new Date().toLocaleString('pt-BR')}\n`;
  msg += '━━━━━━━━━━━━━━━━━━━━━\n\n';
  msg += '🛒 *ITENS DO PEDIDO*\n\n';

  const nomeTipoMap = {
    pulso:'Terço de Pulso', tradicional:'Terço Tradicional',
    chaveiro:'Chaveiro', veiculo:'Terço de Veículo',
    noiva:'Terço de Noiva', luxo:'Terço Luxo',
    infantil:'Terço Infantil', embalagem:'Embalagem', produto:'Produto'
  };

  carrinho.forEach((item, i) => {
    const val = Number(item.total) || 0;
    subtotal += val;
    const tipo = item.tipo || 'produto';
    const temCorMisterio = !['embalagem','produto'].includes(tipo);

    msg += `*${i + 1}. ${item.nome || nomeTipoMap[tipo] || 'Produto'}*\n`;
    if (item.categoria) msg += `   📂 Categoria: ${item.categoria}\n`;
    if (item.modelo && item.modelo !== item.nome) msg += `   🔹 Modelo: ${item.modelo}\n`;
    if (temCorMisterio && item.cor)      msg += `   🎨 Cor: ${item.cor}\n`;
    if (temCorMisterio && item.misterio) msg += `   📿 Mistério: ${item.misterio}\n`;

    const pers = textoPersonalizacao(item);
    if (pers) msg += `   ✍️ Personalização: ${pers}\n`;

    msg += `   💰 Valor: R$ ${val.toFixed(2).replace('.', ',')}\n\n`;
  });

  const total = subtotal + frete;

  msg += '━━━━━━━━━━━━━━━━━━━━━\n';
  msg += '📍 *DADOS DE ENTREGA*\n';
  msg += `👤 Nome: ${nome}\n`;
  msg += `🏠 Endereço: ${endereco}\n`;
  msg += `📌 Bairro: ${bairro}\n\n`;
  msg += '━━━━━━━━━━━━━━━━━━━━━\n';
  msg += `Subtotal: R$ ${subtotal.toFixed(2).replace('.', ',')}\n`;
  msg += `Frete: ${frete === 0 ? 'Grátis 🎉' : 'R$ ' + frete.toFixed(2).replace('.', ',')}\n`;
  msg += `*TOTAL: R$ ${total.toFixed(2).replace('.', ',')}*\n\n`;
  msg += '⏳ Personalizados: até 15 dias úteis.\n';
  msg += '✨ Aguardo confirmação do pedido!';

  window.open(
    'https://wa.me/5587981739920?text=' + encodeURIComponent(msg),
    '_blank'
  );

  carrinho = [];
  salvar();
  render();
}

render();
</script>
